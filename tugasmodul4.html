<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toko Elektronik Cepat</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-deep: #0B1120;
            --bg-panel: #131B2E;
            --bg-panel-2: #1A2438;
            --line: #26314A;
            --cyan: #4CC9F0;
            --amber: #FFB627;
            --green: #6FCF97;
            --red: #FF6B6B;
            --text: #E8EDF5;
            --text-muted: #8B96AC;
            --paper: #F4F1E8;
            --paper-ink: #1B1B1B;
            --font-display: 'Space Grotesk', sans-serif;
            --font-body: 'Inter', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            background:
                radial-gradient(circle at 15% 10%, rgba(76, 201, 240, 0.07), transparent 40%),
                radial-gradient(circle at 85% 90%, rgba(255, 182, 39, 0.06), transparent 45%),
                var(--bg-deep);
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 14px;
            padding: 22px 32px;
            border-bottom: 1px solid var(--line);
            background: linear-gradient(180deg, rgba(19, 27, 46, 0.9), rgba(19, 27, 46, 0.4));
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .brand .bolt {
            width: 34px;
            height: 34px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--cyan), #2b8fb0);
            color: #04121a;
            font-weight: 700;
            font-family: var(--font-display);
        }

        h1 {
            font-family: var(--font-display);
            font-size: 1.5rem;
            margin: 0;
            letter-spacing: 0.5px;
        }

        h1 span {
            color: var(--amber);
        }

        .clock-box {
            font-family: var(--font-mono);
            background: #000;
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 8px 16px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            box-shadow: inset 0 0 12px rgba(76, 201, 240, 0.15);
        }

        #jam {
            color: var(--cyan);
            font-size: 1.1rem;
            font-weight: 700;
            text-shadow: 0 0 8px rgba(76, 201, 240, 0.6);
        }

        #tanggal {
            color: var(--text-muted);
            font-size: 0.72rem;
            letter-spacing: 0.5px;
        }

        /* ===== LAYOUT ===== */
        .layout {
            display: grid;
            grid-template-columns: 230px 1fr 340px;
            gap: 20px;
            padding: 24px 32px 60px;
            align-items: start;
        }

        @media (max-width:980px) {
            .layout {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--line);
            border-radius: 14px;
            padding: 18px;
        }

        .panel h2 {
            font-family: var(--font-display);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin: 0 0 14px 0;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel h2::before {
            content: "";
            width: 6px;
            height: 6px;
            background: var(--cyan);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--cyan);
        }

        /* ===== PRODUCT LIST ===== */
        .product-item {
            display: flex;
            gap: 10px;
            align-items: center;
            padding: 10px 10px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid transparent;
            margin-bottom: 8px;
            transition: background 0.15s, border-color 0.15s, transform 0.1s;
        }

        .product-item:hover {
            background: var(--bg-panel-2);
            transform: translateX(2px);
        }

        .product-item.active {
            background: rgba(76, 201, 240, 0.1);
            border-color: var(--cyan);
        }

        .product-item .sku {
            font-family: var(--font-mono);
            font-size: 0.68rem;
            color: var(--text-muted);
            min-width: 34px;
        }

        .product-item .info {
            display: flex;
            flex-direction: column;
        }

        .product-item .info .nm {
            font-size: 0.85rem;
            font-weight: 600;
        }

        .product-item .info .hg {
            font-size: 0.75rem;
            color: var(--amber);
            font-family: var(--font-mono);
        }

        /* ===== MAIN DISPLAY / SLIDESHOW ===== */
        .slideshow {
            position: relative;
            border-radius: 12px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 4/3;
            border: 1px solid var(--line);
        }

        .slideshow img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        .slide-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(11, 17, 32, 0.65);
            border: 1px solid var(--line);
            color: var(--text);
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            transition: background 0.15s;
        }

        .slide-btn:hover {
            background: rgba(76, 201, 240, 0.35);
        }

        .slide-btn.prev {
            left: 12px;
        }

        .slide-btn.next {
            right: 12px;
        }

        .dots {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 6px;
        }

        .dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.35);
        }

        .dot.active {
            background: var(--cyan);
            box-shadow: 0 0 6px var(--cyan);
        }

        .product-detail {
            margin-top: 16px;
            padding: 16px 18px;
            background: var(--bg-panel-2);
            border-radius: 12px;
            border: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .product-detail .nama {
            font-family: var(--font-display);
            font-size: 1.25rem;
        }

        .product-detail .harga {
            font-family: var(--font-mono);
            font-size: 1.3rem;
            color: var(--amber);
            font-weight: 700;
        }

        /* ===== ORDER FORM (POS style) ===== */
        .field {
            margin-bottom: 14px;
        }

        .field label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 6px;
            letter-spacing: 0.3px;
        }

        .field input {
            width: 100%;
            padding: 10px 12px;
            background: #0D1524;
            border: 1px solid var(--line);
            border-radius: 8px;
            color: var(--text);
            font-family: var(--font-mono);
            font-size: 0.9rem;
        }

        .field input:focus {
            outline: none;
            border-color: var(--cyan);
            box-shadow: 0 0 0 3px rgba(76, 201, 240, 0.15);
        }

        .error-msg {
            color: var(--red);
            font-size: 0.75rem;
            margin-top: 12px;
            display: none;
            font-family: var(--font-mono);
        }

        .btn-pesan {
            width: 100%;
            padding: 13px;
            margin-top: 6px;
            border: none;
            border-radius: 9px;
            background: linear-gradient(135deg, var(--amber), #ff8a3d);
            color: #231200;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 0.95rem;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.2s;
        }

        .btn-pesan:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 18px rgba(255, 182, 39, 0.25);
        }

        .btn-pesan:active {
            transform: translateY(0);
        }

        /* ===== RECEIPT ===== */
        #receipt-wrap {
            margin-top: 20px;
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease;
        }

        #receipt-wrap.show {
            max-height: 900px;
        }

        .receipt {
            background: var(--paper);
            color: var(--paper-ink);
            font-family: var(--font-mono);
            font-size: 0.78rem;
            padding: 18px 16px 22px;
            border-radius: 2px;
            position: relative;
            box-shadow: 0 12px 24px rgba(0, 0, 0, 0.4);
            animation: printOut 0.4s ease;
        }

        @keyframes printOut {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .receipt::after {
            content: "";
            position: absolute;
            left: 0;
            right: 0;
            bottom: -9px;
            height: 18px;
            background:
                radial-gradient(circle at 8px 0, transparent 8px, var(--paper) 8.5px) 0 0 / 16px 18px repeat-x;
        }

        .receipt hr {
            border: none;
            border-top: 1px dashed #999;
            margin: 10px 0;
        }

        .receipt .r-title {
            text-align: center;
            font-weight: 700;
            letter-spacing: 2px;
            font-size: 0.85rem;
        }

        .receipt .r-sub {
            text-align: center;
            font-size: 0.68rem;
            color: #555;
            margin-top: 2px;
        }

        .receipt .row {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
        }

        .receipt .row.total {
            font-weight: 700;
            font-size: 0.92rem;
            margin-top: 8px;
        }

        .receipt .disc {
            color: #b3331f;
        }

        footer {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.75rem;
            padding-bottom: 24px;
            font-family: var(--font-mono);
        }
    </style>
</head>

<body>

    <header>
        <div class="brand">
            <div class="bolt">⚡</div>
            <h1>Toko Elektronik <span>Cepat</span></h1>
        </div>
        <div class="clock-box">
            <div id="jam">--:--:--</div>
            <div id="tanggal">memuat tanggal...</div>
        </div>
    </header>

    <div class="layout">

        <!-- DAFTAR PRODUK -->
        <div class="panel">
            <h2>Daftar Produk</h2>
            <div id="product-list"></div>
        </div>

        <!-- DISPLAY UTAMA -->
        <div class="panel">
            <h2>Etalase</h2>
            <div class="slideshow">
                <img id="slide-img" src="" alt="gambar produk">
                <button class="slide-btn prev" onclick="prevImage()">&#8249;</button>
                <button class="slide-btn next" onclick="nextImage()">&#8250;</button>
                <div class="dots" id="dots"></div>
            </div>
            <div class="product-detail">
                <div class="nama" id="detail-nama">-</div>
                <div class="harga" id="detail-harga">-</div>
            </div>
        </div>

        <!-- FORM PEMESANAN -->
        <div class="panel">
            <h2>Form Pemesanan</h2>
            <div class="field">
                <label for="nama-pemesan">Nama Pemesan</label>
                <input type="text" id="nama-pemesan" placeholder="cth: Budi Santoso">
            </div>
            <div class="field">
                <label for="jumlah-pesan">Jumlah Pesan</label>
                <input type="number" id="jumlah-pesan" min="1" placeholder="cth: 1">
            </div>
            <div class="field">
                <label for="kode-promo">Kode Promo (opsional)</label>
                <input type="text" id="kode-promo" placeholder="cth: DISKON10">
            </div>
            <div class="error-msg" id="error-msg"></div>
            <button class="btn-pesan" onclick="prosesPesanan()">Pesan Sekarang</button>

            <div id="receipt-wrap">
                <div class="receipt" id="receipt"></div>
            </div>
        </div>

    </div>

    <footer>Praktikum Pemrograman Web &mdash; Sistem Kasir Toko Elektronik</footer>

    <script>
        // ============ DATA PRODUK ============
        // Catatan: taruh file foto1.jpg, foto2.jpg, foto3.jpg, foto4.jpg
        // di folder yang SAMA dengan file HTML ini (folder project VS Code kamu).
        const produkList = [
            {
                nama: "Smartphone Nova X12",
                harga: 3499000,
                gambar: [
                    "foto1.jpg"
                ]
            },
            {
                nama: "Laptop UltraBook Z14",
                harga: 8750000,
                gambar: [
                    "foto2.jpg"
                ]
            },
            {
                nama: "Headphone SoundWave Pro",
                harga: 899000,
                gambar: [
                    "foto3.jpg"
                ]
            },
            {
                nama: "Smartwatch PulseFit 5",
                harga: 1250000,
                gambar: [
                    "foto4.jpg"
                ]
            }
        ];

        let indexProdukAktif = 0;
        let indexGambarAktif = 0;

        // ============ FORMAT RUPIAH ============
        function formatRupiah(angka) {
            return "Rp " + angka.toLocaleString("id-ID");
        }

        // ============ JAM & TANGGAL DINAMIS ============
        const namaHari = ["Minggu", "Senin", "Selasa", "Rabu", "Kamis", "Jumat", "Sabtu"];
        const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];

        function updateWaktu() {
            const now = new Date();
            const jam = String(now.getHours()).padStart(2, "0");
            const menit = String(now.getMinutes()).padStart(2, "0");
            const detik = String(now.getSeconds()).padStart(2, "0");
            document.getElementById("jam").textContent = `${jam}:${menit}:${detik}`;

            const teksTanggal = `${namaHari[now.getDay()]}, ${now.getDate()} ${namaBulan[now.getMonth()]} ${now.getFullYear()}`;
            document.getElementById("tanggal").textContent = teksTanggal;
        }
        updateWaktu();
        setInterval(updateWaktu, 1000);

        // ============ RENDER DAFTAR PRODUK (perulangan) ============
        function renderDaftarProduk() {
            const container = document.getElementById("product-list");
            container.innerHTML = "";
            for (let i = 0; i < produkList.length; i++) {
                const p = produkList[i];
                const div = document.createElement("div");
                div.className = "product-item" + (i === indexProdukAktif ? " active" : "");
                div.onclick = function () { pilihProduk(i); };
                div.innerHTML = `
        <div class="sku">#${String(i + 1).padStart(2, "0")}</div>
        <div class="info">
          <div class="nm">${p.nama}</div>
          <div class="hg">${formatRupiah(p.harga)}</div>
        </div>
      `;
                container.appendChild(div);
            }
        }

        function pilihProduk(i) {
            indexProdukAktif = i;
            indexGambarAktif = 0;
            renderDaftarProduk();
            renderSlideshow();
            renderDetailProduk();
        }

        // ============ SLIDESHOW GAMBAR ============
        function renderSlideshow() {
            const produk = produkList[indexProdukAktif];
            document.getElementById("slide-img").src = produk.gambar[indexGambarAktif];

            const dotsContainer = document.getElementById("dots");
            dotsContainer.innerHTML = "";
            for (let i = 0; i < produk.gambar.length; i++) {
                const dot = document.createElement("div");
                dot.className = "dot" + (i === indexGambarAktif ? " active" : "");
                dotsContainer.appendChild(dot);
            }
        }

        function nextImage() {
            const produk = produkList[indexProdukAktif];
            indexGambarAktif = (indexGambarAktif + 1) % produk.gambar.length;
            renderSlideshow();
        }

        function prevImage() {
            const produk = produkList[indexProdukAktif];
            indexGambarAktif = (indexGambarAktif - 1 + produk.gambar.length) % produk.gambar.length;
            renderSlideshow();
        }

        // ============ DETAIL PRODUK AKTIF ============
        function renderDetailProduk() {
            const produk = produkList[indexProdukAktif];
            document.getElementById("detail-nama").textContent = produk.nama;
            document.getElementById("detail-harga").textContent = formatRupiah(produk.harga);
        }

        // ============ LOGIKA PEMESANAN ============
        function tampilkanError(pesan) {
            const el = document.getElementById("error-msg");
            el.textContent = pesan;
            el.style.display = "block";
        }

        function sembunyikanError() {
            document.getElementById("error-msg").style.display = "none";
        }

        function generateOrderId() {
            const angkaAcak = Math.floor(10000 + Math.random() * 90000); // 5 digit
            return "INV-" + angkaAcak;
        }

        function prosesPesanan() {
            sembunyikanError();

            const namaPemesan = document.getElementById("nama-pemesan").value.trim();
            const jumlahInput = document.getElementById("jumlah-pesan").value;
            const kodePromoInput = document.getElementById("kode-promo").value.trim();
            const jumlah = parseInt(jumlahInput);

            // ---- Validasi ----
            if (namaPemesan === "") {
                tampilkanError("Nama pemesan tidak boleh kosong.");
                return;
            }
            if (jumlahInput === "" || isNaN(jumlah) || jumlah <= 0) {
                tampilkanError("Jumlah pesan harus lebih dari 0.");
                return;
            }

            const produk = produkList[indexProdukAktif];
            const subtotal = produk.harga * jumlah;

            // ---- Percabangan kode promo ----
            const promoUpper = kodePromoInput.toUpperCase();
            let potongan = 0;
            let promoValid = false;

            if (promoUpper === "DISKON10") {
                potongan = subtotal * 0.10;
                promoValid = true;
            }

            const totalAkhir = subtotal - potongan;
            const orderId = generateOrderId();
            const sekarang = new Date();
            const waktuStruk = `${String(sekarang.getHours()).padStart(2, "0")}:${String(sekarang.getMinutes()).padStart(2, "0")}:${String(sekarang.getSeconds()).padStart(2, "0")}`;

            tampilkanStruk({
                orderId, namaPemesan, produk, jumlah, subtotal,
                potongan, totalAkhir, promoValid, promoUpper, waktuStruk
            });
        }

        function tampilkanStruk(data) {
            const { orderId, namaPemesan, produk, jumlah, subtotal, potongan, totalAkhir, promoValid, promoUpper, waktuStruk } = data;

            const struk = document.getElementById("receipt");
            struk.innerHTML = `
      <div class="r-title">TOKO ELEKTRONIK CEPAT</div>
      <div class="r-sub">Struk Pemesanan &middot; ${waktuStruk}</div>
      <hr>
      <div class="row"><span>Order ID</span><span>${orderId}</span></div>
      <div class="row"><span>Nama Pemesan</span><span>${namaPemesan}</span></div>
      <hr>
      <div class="row"><span>${produk.nama}</span><span></span></div>
      <div class="row"><span>${formatRupiah(produk.harga)} x ${jumlah}</span><span>${formatRupiah(subtotal)}</span></div>
      <hr>
      <div class="row"><span>Subtotal</span><span>${formatRupiah(subtotal)}</span></div>
      <div class="row disc"><span>Potongan ${promoValid ? "(" + promoUpper + ")" : ""}</span><span>${potongan > 0 ? "- " + formatRupiah(potongan) : formatRupiah(0)}</span></div>
      <hr>
      <div class="row total"><span>TOTAL AKHIR</span><span>${formatRupiah(totalAkhir)}</span></div>
      <div class="r-sub" style="margin-top:10px;">Terima kasih telah berbelanja!</div>
    `;

            document.getElementById("receipt-wrap").classList.add("show");
        }

        // ============ INISIALISASI ============
        renderDaftarProduk();
        renderSlideshow();
        renderDetailProduk();
    </script>

</body>

</html>
