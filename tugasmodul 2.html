<!DOCTYPE html>
<html>

<head>
    <title>Praktikum CSS</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #add8e6;
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            color: white;
            font-size: 40px;
            text-align: center;
            margin-bottom: 20px;
        }

        p {
            background-color: #d3d3d3;
            color: black;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            max-width: 800px;
            margin: auto;
        }

        .box1,
        .box2,
        .box3 {
            border: 2px solid black;
            padding: 10px;
            height: 150px;
            border-radius: 15px;
            font-size: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box1 {
            background-color: #ff9999;
        }

        .box2 {
            background-color: #99ff99;
        }

        .box3 {
            background-color: #9999ff;
        }

        /* Tablet */
        @media screen and (max-width: 768px) {

            .container {
                grid-template-columns: repeat(2, 1fr);
            }

        }

        /* Smartphone */
        @media screen and (max-width: 480px) {

            .container {
                grid-template-columns: 1fr;
            }

            h1 {
                font-size: 28px;
            }

            p {
                padding: 10px;
            }

            .box1,
            .box2,
            .box3 {
                height: 120px;
            }

        }
    </style>
</head>

<body>

    <h1>Praktikum CSS</h1>

    <p>
        halaman praktikum CSS sederhana yang menggunakan warna,
        grid layout, responsive design, border radius, dan media query.
    </p>

    <div class="container">

        <div class="box1">
            Box 1
        </div>

        <div class="box2">
            Box 2
        </div>

        <div class="box3">
            Box 3
        </div>

    </div>

</body>

</html>
